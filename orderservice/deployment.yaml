apiVersion: apps/v1
kind: Deployment
metadata:
  name: orderservice
  labels:
    app: orderservice
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orderservice
  template:
    labels:
      app: orderservice
    spec:
      conatiners:
      - name: orderservice
        image: athul9thd/orderservice:latest
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_NAME
          value: orders
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          value: postgres
