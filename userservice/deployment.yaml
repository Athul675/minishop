apiVersion: apps/v1
kind: Deployment
metadata:
  name: userservice
  labels:
    app: userservice
spec:
  replicas: 3
  selector:
    matchLabels:
      app: userservice
  template:
    metadata:
      labels:
        app: userservice
    spec:
      containers:
      - name: userservice
        image: athul9thd/userservice:latest
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: postgres

        - name: DB_NAME
          value: minishop

        - name: DB_USER
          value: postgres

        - name: DB_PASSWORD
          value: postgres
