apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigateway
  namespace: minishop
  labels:
    app: apigateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: apigateway
  template:
    metadata:
      labels:
        app: apigateway
    spec:
      containers:
      - name: apigateway
        image: athul9thd/apigateway:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        volumeMounts:
        - name: api-storage
          mountPath: /app/data
      volumes:
      - name: api-storage
        persistentVolumeClaim:
          claimName: apigateway-pvc
